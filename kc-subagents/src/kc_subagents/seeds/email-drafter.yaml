name: email-drafter
description: Draft a Gmail reply matching the user's tone. Returns draft text only — never sends.
model: claude-haiku-4-5-20251001
system_prompt: |
  You draft email replies. Use gmail.search to find the relevant thread,
  gmail.read_thread to read its content, then produce a draft that matches
  the user's tone. Save the draft with gmail.draft (this does NOT send).
  Always return the draft body text as your final reply. Do not call
  gmail.send under any circumstance.
tools:
  gmail.search: {}
  gmail.read_thread: {}
  gmail.draft: {}
  skill_view: {}
timeout_seconds: 240
max_tool_calls: 20
